<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewAPI 签到配置</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6f8;
            --surface: #ffffff;
            --surface-muted: #f8fafb;
            --text: #17212b;
            --muted: #5f6b76;
            --border: #d7dde3;
            --primary: #087f6d;
            --primary-hover: #066758;
            --danger: #c93434;
            --focus: #80c9bd;
            --code: #101820;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, "Segoe UI", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        button, input, textarea { font: inherit; }

        button:focus-visible, input:focus-visible, textarea:focus-visible {
            outline: 3px solid var(--focus);
            outline-offset: 1px;
        }

        .app-header {
            background: #1e2933;
            color: #fff;
            border-bottom: 4px solid var(--primary);
        }

        .header-inner, .workspace {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
        }

        .header-inner {
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        h1 { margin: 0; font-size: 22px; font-weight: 700; }
        .subtitle { margin: 3px 0 0; color: #cbd5dd; }

        .workspace { padding: 24px 0 48px; }

        .toolbar, .section-heading, .account-heading, .result-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar {
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .toolbar-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            min-height: 38px;
            padding: 8px 13px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
        }

        .btn:hover { background: #edf2f5; }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { color: var(--danger); border-color: #efb7b7; }
        .btn-small { min-height: 32px; padding: 5px 10px; font-size: 13px; }

        .site-section {
            margin-top: 20px;
            padding: 20px 0 4px;
            border-top: 2px solid #9aa7b2;
        }

        .site-section:first-child { border-top: 0; padding-top: 4px; }
        .section-heading h2, .result-heading h2 { margin: 0; font-size: 18px; }

        .site-fields {
            display: grid;
            grid-template-columns: minmax(260px, 2fr) minmax(220px, 1fr);
            gap: 12px;
            margin-top: 14px;
        }

        .field { min-width: 0; }
        .field label { display: block; margin-bottom: 5px; font-weight: 600; color: #36434e; }
        .field small { display: block; color: var(--muted); margin-top: 4px; }

        input, textarea {
            width: 100%;
            border: 1px solid #b9c3cc;
            border-radius: 5px;
            background: #fff;
            color: var(--text);
            padding: 9px 10px;
        }

        input { min-height: 40px; }
        textarea { min-height: 230px; resize: vertical; font-family: Consolas, monospace; }

        .accounts { margin-top: 18px; border: 1px solid var(--border); }

        .account-row {
            padding: 15px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .account-row:last-child { border-bottom: 0; }
        .account-heading { margin-bottom: 12px; }
        .account-heading strong { font-size: 14px; }

        .account-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .span-2 { grid-column: span 2; }
        .site-actions { margin-top: 10px; }

        .generate-bar {
            position: sticky;
            bottom: 0;
            z-index: 5;
            display: flex;
            justify-content: flex-end;
            padding: 14px 0;
            margin-top: 20px;
            background: rgba(244, 246, 248, 0.96);
            border-top: 1px solid var(--border);
        }

        .generate-bar .btn { min-width: 180px; }

        .result {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--primary);
        }

        .result[hidden] { display: none; }
        .result-meta { margin: 4px 0 12px; color: var(--muted); }

        pre {
            margin: 0;
            padding: 16px;
            max-height: 430px;
            overflow: auto;
            border-radius: 6px;
            background: var(--code);
            color: #e8eef2;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            font: 13px/1.55 Consolas, "SFMono-Regular", monospace;
        }

        .security-note {
            margin: 14px 0 0;
            padding: 10px 12px;
            border-left: 3px solid #d29a16;
            background: #fff8df;
            color: #5c4818;
        }

        dialog {
            width: min(680px, calc(100% - 32px));
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.22);
        }

        dialog::backdrop { background: rgba(15, 23, 42, 0.55); }
        .dialog-body { padding: 20px; }
        .dialog-body h2 { margin: 0 0 14px; font-size: 18px; }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 20;
            max-width: min(420px, calc(100% - 40px));
            padding: 11px 14px;
            border-radius: 6px;
            background: #17212b;
            color: #fff;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.24);
        }

        .toast[hidden] { display: none; }

        @media (max-width: 820px) {
            .site-fields, .account-grid { grid-template-columns: 1fr; }
            .span-2 { grid-column: auto; }
            .header-inner { align-items: flex-start; padding: 15px 0; flex-direction: column; }
        }

        @media (max-width: 520px) {
            .header-inner, .workspace { width: min(100% - 20px, 1120px); }
            .toolbar-group, .toolbar-group .btn, .generate-bar .btn { width: 100%; }
            .generate-bar { padding-bottom: 10px; }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <div>
                <h1>NewAPI 签到配置</h1>
                <p class="subtitle">生成后自动复制 JSON，并保存到当前浏览器。</p>
            </div>
        </div>
    </header>

    <main class="workspace">
        <div class="toolbar">
            <div class="toolbar-group">
                <button class="btn" type="button" onclick="addSite()">添加站点</button>
                <button class="btn" type="button" onclick="openImport()">导入 JSON</button>
            </div>
            <div class="toolbar-group">
                <button class="btn" id="restore-button" type="button" onclick="restoreLocal()">恢复本地配置</button>
                <button class="btn btn-danger" type="button" onclick="clearLocal()">清除本地配置</button>
            </div>
        </div>

        <div id="sites-container"></div>

        <div class="generate-bar">
            <button class="btn btn-primary" type="button" onclick="generateConfig()">生成并复制 JSON</button>
        </div>

        <section class="result" id="result" hidden>
            <div class="result-heading">
                <div>
                    <h2>JSON 配置</h2>
                    <p class="result-meta" id="result-meta"></p>
                </div>
                <div class="result-actions">
                    <button class="btn btn-small" type="button" onclick="openGitHubSecrets()">打开 GitHub Secrets</button>
                    <button class="btn btn-small" type="button" onclick="copyGeneratedConfig()">重新复制</button>
                </div>
            </div>
            <pre id="json-output" tabindex="0"></pre>
            <p class="security-note">本地存储为浏览器明文存储。生成后请将 JSON、SMTP 密码、钉钉密钥等分别保存到 GitHub Actions Secrets，不要提交到仓库。</p>
        </section>
    </main>

    <dialog id="import-dialog">
        <div class="dialog-body">
            <h2>导入账号 JSON</h2>
            <textarea id="import-json" spellcheck="false" placeholder='[{"url":"https://api.example.com","session":"..."}]'></textarea>
            <div class="dialog-actions">
                <button class="btn" type="button" onclick="closeImport()">取消</button>
                <button class="btn btn-primary" type="button" onclick="importConfig()">导入</button>
            </div>
        </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <script>
        const STORAGE_KEY = 'newapi_checkin_accounts';
        let siteSequence = 0;
        const accountSequences = new Map();
        let toastTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            addSite();
            const hasLocal = Boolean(localStorage.getItem(STORAGE_KEY));
            document.getElementById('restore-button').disabled = !hasLocal;
            if (hasLocal) showToast('发现本地配置，可点击“恢复本地配置”。');
        });

        function addSite(site = {}) {
            siteSequence += 1;
            const siteId = siteSequence;
            accountSequences.set(siteId, 0);

            const section = document.createElement('section');
            section.className = 'site-section';
            section.id = `site-${siteId}`;
            section.innerHTML = `
                <div class="section-heading">
                    <h2>站点 ${siteId}</h2>
                    <button class="btn btn-danger btn-small" type="button" onclick="removeSite(${siteId})">删除站点</button>
                </div>
                <div class="site-fields">
                    <div class="field">
                        <label for="site-url-${siteId}">站点 URL</label>
                        <input id="site-url-${siteId}" type="url" placeholder="https://api.example.com">
                    </div>
                    <div class="field">
                        <label for="site-cf-${siteId}">CF Clearance，可选</label>
                        <input id="site-cf-${siteId}" type="text" autocomplete="off">
                    </div>
                </div>
                <div class="accounts" id="accounts-${siteId}"></div>
                <div class="site-actions">
                    <button class="btn btn-small" type="button" onclick="addAccount(${siteId})">添加账号</button>
                </div>`;

            document.getElementById('sites-container').appendChild(section);
            document.getElementById(`site-url-${siteId}`).value = site.url || '';
            document.getElementById(`site-cf-${siteId}`).value = site.cf_clearance || '';

            const accounts = site.accounts && site.accounts.length ? site.accounts : [{}];
            accounts.forEach(account => addAccount(siteId, account));
        }

        function addAccount(siteId, account = {}) {
            const next = (accountSequences.get(siteId) || 0) + 1;
            accountSequences.set(siteId, next);

            const row = document.createElement('div');
            row.className = 'account-row';
            row.id = `account-${siteId}-${next}`;
            row.innerHTML = `
                <div class="account-heading">
                    <strong>账号 ${next}</strong>
                    <button class="btn btn-danger btn-small" type="button" onclick="removeAccount(${siteId}, ${next})">删除</button>
                </div>
                <div class="account-grid">
                    <div class="field span-2">
                        <label for="session-${siteId}-${next}">Session Cookie</label>
                        <input id="session-${siteId}-${next}" type="text" autocomplete="off">
                    </div>
                    <div class="field">
                        <label for="user-${siteId}-${next}">用户 ID，可选</label>
                        <input id="user-${siteId}-${next}" type="text" inputmode="numeric">
                    </div>
                    <div class="field">
                        <label for="name-${siteId}-${next}">备注名称</label>
                        <input id="name-${siteId}-${next}" type="text" placeholder="主账号">
                    </div>
                    <div class="field">
                        <label for="login-user-${siteId}-${next}">登录账号，可选</label>
                        <input id="login-user-${siteId}-${next}" type="text" autocomplete="username">
                    </div>
                    <div class="field">
                        <label for="login-pass-${siteId}-${next}">登录密码，可选</label>
                        <input id="login-pass-${siteId}-${next}" type="password" autocomplete="current-password">
                    </div>
                </div>`;

            document.getElementById(`accounts-${siteId}`).appendChild(row);
            setValue(`session-${siteId}-${next}`, account.session);
            setValue(`user-${siteId}-${next}`, account.user_id);
            setValue(`name-${siteId}-${next}`, account.name);
            setValue(`login-user-${siteId}-${next}`, account.login_username);
            setValue(`login-pass-${siteId}-${next}`, account.login_password);
        }

        function removeSite(siteId) {
            const sites = document.querySelectorAll('.site-section');
            if (sites.length === 1) {
                showToast('至少保留一个站点。');
                return;
            }
            document.getElementById(`site-${siteId}`)?.remove();
            accountSequences.delete(siteId);
        }

        function removeAccount(siteId, accountId) {
            const container = document.getElementById(`accounts-${siteId}`);
            if (container.children.length === 1) {
                showToast('每个站点至少保留一个账号。');
                return;
            }
            document.getElementById(`account-${siteId}-${accountId}`)?.remove();
        }

        async function generateConfig() {
            let accounts;
            try {
                accounts = collectAccounts();
            } catch (error) {
                showToast(error.message);
                return;
            }

            const json = JSON.stringify(accounts, null, 2);
            document.getElementById('json-output').textContent = json;
            document.getElementById('result-meta').textContent = `${accounts.length} 个账号，已保存到当前浏览器。`;
            document.getElementById('result').hidden = false;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
            document.getElementById('restore-button').disabled = false;

            const copied = await copyText(json);
            showToast(copied ? 'JSON 已生成、保存并复制。' : 'JSON 已生成并保存，请在下方手动复制。');
            document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function collectAccounts() {
            const accounts = [];
            document.querySelectorAll('.site-section').forEach(section => {
                const siteId = section.id.split('-')[1];
                let url = valueOf(`site-url-${siteId}`);
                const clearance = valueOf(`site-cf-${siteId}`);
                if (!url) throw new Error(`站点 ${siteId} 缺少 URL。`);
                if (!/^https?:\/\//i.test(url)) url = `https://${url}`;

                section.querySelectorAll('.account-row').forEach(row => {
                    const parts = row.id.split('-');
                    const accountId = parts[2];
                    const session = valueOf(`session-${siteId}-${accountId}`);
                    if (!session) throw new Error(`站点 ${siteId} 的账号 ${accountId} 缺少 Session。`);

                    const account = { url, session };
                    addOptional(account, 'user_id', valueOf(`user-${siteId}-${accountId}`));
                    addOptional(account, 'name', valueOf(`name-${siteId}-${accountId}`));
                    addOptional(account, 'cf_clearance', clearance);
                    addOptional(account, 'login_username', valueOf(`login-user-${siteId}-${accountId}`));
                    addOptional(account, 'login_password', valueOf(`login-pass-${siteId}-${accountId}`));
                    accounts.push(account);
                });
            });
            return accounts;
        }

        function restoreLocal() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) {
                showToast('没有可恢复的本地配置。');
                return;
            }
            try {
                renderAccounts(JSON.parse(raw));
                showToast('本地配置已恢复。');
            } catch (error) {
                showToast(`本地配置无法读取: ${error.message}`);
            }
        }

        function clearLocal() {
            if (!localStorage.getItem(STORAGE_KEY)) {
                showToast('没有本地配置。');
                return;
            }
            if (!window.confirm('确定清除当前浏览器中保存的账号配置吗？')) return;
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('restore-button').disabled = true;
            showToast('本地配置已清除。');
        }

        function openImport() {
            document.getElementById('import-dialog').showModal();
            document.getElementById('import-json').focus();
        }

        function closeImport() {
            document.getElementById('import-dialog').close();
        }

        function importConfig() {
            try {
                const accounts = JSON.parse(document.getElementById('import-json').value.trim());
                validateImportedAccounts(accounts);
                renderAccounts(accounts);
                closeImport();
                showToast(`已导入 ${accounts.length} 个账号。`);
            } catch (error) {
                showToast(`导入失败: ${error.message}`);
            }
        }

        function validateImportedAccounts(accounts) {
            if (!Array.isArray(accounts) || accounts.length === 0) {
                throw new Error('JSON 必须是非空账号数组。');
            }
            accounts.forEach((account, index) => {
                if (!account || !account.url || !account.session) {
                    throw new Error(`第 ${index + 1} 个账号缺少 url 或 session。`);
                }
            });
        }

        function renderAccounts(accounts) {
            validateImportedAccounts(accounts);
            const grouped = new Map();
            accounts.forEach(account => {
                const key = `${account.url}|${account.cf_clearance || ''}`;
                if (!grouped.has(key)) {
                    grouped.set(key, {
                        url: account.url,
                        cf_clearance: account.cf_clearance || '',
                        accounts: [],
                    });
                }
                grouped.get(key).accounts.push(account);
            });

            document.getElementById('sites-container').innerHTML = '';
            siteSequence = 0;
            accountSequences.clear();
            grouped.forEach(site => addSite(site));
            document.getElementById('result').hidden = true;
        }

        async function copyGeneratedConfig() {
            const json = document.getElementById('json-output').textContent;
            const copied = await copyText(json);
            showToast(copied ? 'JSON 已复制。' : '复制失败，请手动复制。');
        }

        function openGitHubSecrets() {
            let repository = 'Qiscard/Newapi-checkin';
            if (window.location.hostname.endsWith('.github.io')) {
                const owner = window.location.hostname.slice(0, -'.github.io'.length);
                const repo = window.location.pathname.split('/').filter(Boolean)[0];
                if (owner && repo) repository = `${owner}/${repo}`;
            }
            window.open(
                `https://github.com/${repository}/settings/secrets/actions`,
                '_blank',
                'noopener,noreferrer',
            );
        }

        async function copyText(text) {
            if (!text) return false;
            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (_) {}
            }
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            const copied = document.execCommand('copy');
            textarea.remove();
            return copied;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.hidden = false;
            window.clearTimeout(toastTimer);
            toastTimer = window.setTimeout(() => { toast.hidden = true; }, 3200);
        }

        function valueOf(id) { return document.getElementById(id)?.value.trim() || ''; }
        function setValue(id, value) { document.getElementById(id).value = value || ''; }
        function addOptional(target, key, value) { if (value) target[key] = value; }
    </script>
</body>
</html>
